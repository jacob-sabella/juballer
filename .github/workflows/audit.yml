name: Security Audit

# Runs `cargo audit` against the workspace lockfile to flag known
# RustSec advisories in transitive dependencies. Triggers on every
# push to main, every Cargo.lock change in PRs, and weekly so newly
# disclosed advisories surface even when the dep tree is quiet.

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
