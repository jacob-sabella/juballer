# Plugin-owned page shipped by the `discord` plugin. Registered as
# `discord:overview` at deck startup (see manifest's `pages` array).

[meta]
title = "Discord"
logical_rows = 4
logical_cols = 4
pinned_rows = [3]

[top]
kind = "stack"
dir = "vertical"
gap = 8
children = [
    { size = { fixed = 56 }, pane = "clock" },
    { size = { ratio = 1.0 }, pane = "discord" },
    { size = { fixed = 72 }, pane = "toast" },
]

[top_panes.clock]
widget = "clock"
format = "DISCORD  %H:%M:%S"

[top_panes.discord]
widget = "dynamic"
tree_key = "discord"
placeholder = "discord plugin not connected"

[top_panes.toast]
widget = "notification_toast"
prefixes = ["action."]
dismiss_after_ms = 2500

# ROW 0 — navigation to Discord app views.
# All use `hyprctl dispatch exec '[workspace 2 silent; ...]'` so the Discord
# window opens on workspace 2 (Samsung monitor), NOT on the deck monitor.
[[button]]
row = 0
col = 0
action = "shell.run"
args = { cmd = "hyprctl dispatch exec '[workspace 2 silent] xdg-open discord://discord.com/channels/@me'" }
icon = "📬"
label = "DMs"
shader = { wgsl = "/home/jsabella/Projects/juballer/crates/juballer-deck/examples/shaders/kind_glow.wgsl" }

[[button]]
row = 0
col = 1
action = "shell.run"
args = { cmd = "hyprctl dispatch exec '[workspace 2 silent] xdg-open discord://discord.com/channels/@me/friends'" }
icon = "👥"
label = "friends"
shader = { wgsl = "/home/jsabella/Projects/juballer/crates/juballer-deck/examples/shaders/kind_glow.wgsl" }

